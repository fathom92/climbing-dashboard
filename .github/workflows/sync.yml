name: Hourly Climbing Metrics Sync

on:
  schedule:
    # Runs precisely at the top of every hour, 24 times a day
    - cron: '23 * * * *'
  workflow_dispatch:
    # Keeps your manual "Run workflow" button active inside the Actions panel

permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialise Node.js Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Runtime Dependencies
        run: |
          npm init -y
          npm install node-fetch

      - name: Execute Live Analytics Calculations Engine
        env:
          THECRAG_USERNAME: ${{ secrets.THECRAG_USERNAME }}
          THECRAG_API_KEY: ${{ secrets.THECRAG_API_KEY }}
        run: node fetch_data.js

      - name: Commit and Push Updated Data Artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json
          
          # Only commit if data payloads have actually drifted or changed
          if ! git diff --cached --quiet; then
            git commit -m "Automated Hourly Telemetry Refresh [skip ci]"
            git push origin main
          else
            echo "No data drift detected during this hour window. Skipping push."
          fi
